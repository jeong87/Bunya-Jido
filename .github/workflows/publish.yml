name: Publish Python package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Verify and build release distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build twine
      - name: Match release tag to package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(python -c 'from bunya_jido import __version__; print(__version__)')"
          test "${RELEASE_TAG}" = "v${PACKAGE_VERSION}"
      - name: Run release gate
        run: |
          python -m unittest discover -s tests
          python -m bunya_jido diagnose --root . --require-grounded --json
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bunya-jido
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
